name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: 魔方拍照解

jobs:
  test:
    name: Test (Python 3.10 / Node.js 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: 魔方拍照解/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Run frontend tests
        run: |
          node tests/recognition.test.js
          node tests/color.test.js
          node tests/two_by_two_color.test.js
          node tests/solver_ui.test.js

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q cube_app server.py
