name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: 魔方拍照解

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate canonical version and release tag
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          args=()
          if [[ -n "$RELEASE_TAG" ]]; then args=(--tag "$RELEASE_TAG"); fi
          VERSION=$(python release/check_version.py "${args[@]}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint (Ruff)
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 魔方拍照解/pyproject.toml

      - name: Install development tools
        run: python -m pip install --upgrade pip -e ".[dev]"

      - name: Run Ruff lint
        run: ruff check .

  python-tests:
    name: Python ${{ matrix.python-version }}
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: 魔方拍照解/pyproject.toml

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip -e ".[dev]"

      - name: Run Python tests and report skips
        if: matrix.python-version != '3.12'
        run: pytest -ra -m "not native_pdb and not native_slow"

      - name: Run branch coverage gate
        if: matrix.python-version == '3.12'
        run: >-
          pytest -ra
          -m "not native_binary and not native_pdb and not native_slow and not vision_real"
          --cov=cube_app --cov=server --cov-branch --cov-report=term-missing

      - name: Compile Python sources
        run: python -m compileall -q cube_app server.py windows_launcher.py

  frontend-tests:
    name: Frontend (Node.js 20)
    needs: version-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run frontend tests
        run: |
          node tests/recognition.test.js
          node tests/color.test.js
          node tests/two_by_two_color.test.js
          node tests/solver_ui.test.js

  native-windows:
    name: Native solver (Windows / UCRT64)
    needs: version-check
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 魔方拍照解/pyproject.toml

      - name: Set up MSYS2 UCRT64 toolchain
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-gcc

      - name: Install Python and release dependencies
        run: python -m pip install --upgrade pip -e ".[dev,release]"

      - name: Check C++ formatting
        run: |
          $clangFormat = "${{ steps.msys2.outputs.msys2-location }}\ucrt64\bin\clang-format.exe"
          $files = Get-ChildItem native\src, native\include -Recurse -File -Include *.cpp, *.hpp
          & $clangFormat --dry-run --Werror --style=file $files.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "clang-format check failed with exit code $LASTEXITCODE"
          }

      - name: Build native solver
        run: .\native\build.ps1 -Compiler "${{ steps.msys2.outputs.msys2-location }}\ucrt64\bin\g++.exe"

      - name: Run required native binary tests
        env:
          REQUIRE_NATIVE_BINARY: "1"
        run: pytest -ra -m native_binary

      - name: Restore native PDB cache
        id: native-pdb-cache
        uses: actions/cache@v4
        with:
          path: 魔方拍照解/.cache/native
          key: native-pdb-v2-${{ runner.os }}-ucrt64-${{ hashFiles('魔方拍照解/native/src/**', '魔方拍照解/native/include/**', '魔方拍照解/native/build_tables.ps1') }}

      - name: Build required PDBs on cache miss
        if: steps.native-pdb-cache.outputs.cache-hit != 'true'
        run: .\native\build_tables.ps1 -CiMinimal

      - name: Verify required native assets
        run: |
          $required = @(
            "native\build\cube_solver.exe",
            ".cache\native\corner_htm_v2.pdb",
            ".cache\native\phase1_sym_htm_v2.pdb"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Required native CI asset is missing: $path"
            }
          }

      - name: Run required native PDB tests
        env:
          REQUIRE_NATIVE_PDB: "1"
        run: pytest -ra -m native_pdb

      - name: Build Windows portable package
        run: .\release\build_windows.ps1 -Python python -SkipNativeBuild -SkipTableBuild

      - name: Upload Windows portable package
        uses: actions/upload-artifact@v4
        with:
          name: RubicPhotoSolve-${{ needs.version-check.outputs.version }}-windows-x64
          path: 魔方拍照解/dist/RubicPhotoSolve-*-windows-x64.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version-check, lint, python-tests, frontend-tests, native-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download tested Windows package
        uses: actions/download-artifact@v4
        with:
          name: RubicPhotoSolve-${{ needs.version-check.outputs.version }}-windows-x64
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Cube Lens v${{ needs.version-check.outputs.version }}
          generate_release_notes: true
          files: release-assets/*.zip
